# XcodeGen spec — chạy `xcodegen generate` để tạo ZaloGiamSat.xcodeproj
# (hoặc tự tạo project iOS App "ZaloGiamSat" trong Xcode rồi kéo thư mục ZaloGiamSat/ vào).
name: ZaloGiamSat
options:
  bundleIdPrefix: com.zalogiamsat
  deploymentTarget:
    iOS: "17.0"            # WKWebsiteDataStore(forIdentifier:) cần iOS 17+
  createIntermediateGroups: true

targets:
  ZaloGiamSat:
    type: application
    platform: iOS
    sources:
      - path: ZaloGiamSat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zalogiamsat.ios
        PRODUCT_NAME: ZaloGiamSat
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ZaloGiamSat/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_EMIT_LOC_STRINGS: YES
