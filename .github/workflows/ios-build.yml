name: iOS Build

# Build app iOS trên máy ảo macOS của GitHub (miễn phí cho repo public).
# Không cần bạn có máy Mac: mỗi lần push sẽ tự dựng project + biên dịch để bắt lỗi.
on:
  push:
  pull_request:
  workflow_dispatch:   # cho phép bấm "Run workflow" thủ công

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chọn Xcode mới nhất (đọc được project format mới của XcodeGen)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS (in lỗi chi tiết qua annotation)
        run: |
          set +e
          echo "===== xcodebuild -version ====="
          xcodebuild -version
          echo "===== ls ====="
          ls -la
          echo "===== xcodebuild -list ====="
          LIST=$(xcodebuild -list -project ZaloGiamSat.xcodeproj 2>&1); LC=$?
          echo "$LIST"
          if [ $LC -ne 0 ]; then
            MSG="${LIST//$'\n'/%0A}"
            echo "::error::xcodebuild -list FAILED (exit $LC)%0A${MSG}"
            exit $LC
          fi
          echo "===== xcodebuild build ====="
          xcodebuild \
            -project ZaloGiamSat.xcodeproj \
            -scheme ZaloGiamSat \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log
          BC=${PIPESTATUS[0]}
          if [ $BC -ne 0 ]; then
            ERR=$(grep -E "error:|fatal error|cannot find|no such module|Command .* failed|does not contain" build.log | tail -40)
            [ -z "$ERR" ] && ERR=$(tail -40 build.log)
            MSG="${ERR//$'\n'/%0A}"
            echo "::error::BUILD FAILED (exit $BC)%0A${MSG}"
            exit $BC
          fi

      - name: Đóng gói .app cho Simulator (artifact tải về)
        run: |
          APP=$(find build/Build/Products -name '*.app' -maxdepth 3 | head -n1)
          echo "APP=$APP"
          mkdir -p out && cp -R "$APP" out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaloGiamSat-sim-app
          path: out/
