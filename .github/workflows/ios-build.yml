name: iOS Build

# Build app iOS trên máy ảo macOS của GitHub (miễn phí cho repo public).
# Không cần bạn có máy Mac: mỗi lần push sẽ tự dựng project + biên dịch để bắt lỗi.
on:
  push:
  pull_request:
  workflow_dispatch:   # cho phép bấm "Run workflow" thủ công

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chọn Xcode mới nhất (đọc được project format mới của XcodeGen)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS (in lỗi chi tiết qua annotation)
        run: |
          set +e
          echo "===== xcodebuild -version ====="
          xcodebuild -version
          echo "===== ls ====="
          ls -la
          echo "===== xcodebuild -list ====="
          LIST=$(xcodebuild -list -project ZaloGiamSat.xcodeproj 2>&1); LC=$?
          echo "$LIST"
          if [ $LC -ne 0 ]; then
            MSG="${LIST//$'\n'/%0A}"
            echo "::error::xcodebuild -list FAILED (exit $LC)%0A${MSG}"
            exit $LC
          fi
          echo "===== xcodebuild build (iphoneos, CHƯA KÝ) ====="
          xcodebuild \
            -project ZaloGiamSat.xcodeproj \
            -scheme ZaloGiamSat \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log
          BC=${PIPESTATUS[0]}
          if [ $BC -ne 0 ]; then
            ERR=$(grep -E "error:|fatal error|cannot find|no such module|Command .* failed|does not contain" build.log | tail -40)
            [ -z "$ERR" ] && ERR=$(tail -40 build.log)
            MSG="${ERR//$'\n'/%0A}"
            echo "::error::BUILD FAILED (exit $BC)%0A${MSG}"
            exit $BC
          fi

      - name: Đóng gói .ipa CHƯA KÝ (để sideload bằng Apple ID free)
        run: |
          set -e
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          echo "APP=$APP"
          rm -rf Payload out
          mkdir -p Payload out
          cp -R "$APP" Payload/
          zip -qry out/ZaloGiamSat-unsigned.ipa Payload
          ls -la out

      - name: Upload .ipa chưa ký
        uses: actions/upload-artifact@v4
        with:
          name: ZaloGiamSat-unsigned-ipa
          path: out/ZaloGiamSat-unsigned.ipa
          if-no-files-found: error
